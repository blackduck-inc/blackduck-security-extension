# Workflow: Runs Black Duck Polaris security analysis on the repository.
# Uses a reusable workflow for SCA and SAST assessment.
name: Polaris Analysis

on:
  workflow_call:
    secrets:
      POLARIS_ACCESS_TOKEN:
        required: true
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: polaris-${{ github.ref }}
  cancel-in-progress: true

jobs:
  polaris:
    uses: blackduck-inc/common-repo-ci/.github/workflows/polaris.yml@main
    with:
      polaris_server_url: ${{ vars.POLARIS_SERVER_URL }}
      polaris_assessment_types: "SCA,SAST"
      polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
      polaris_prComment_enabled: true
      polaris_prComment_severities: "Critical,High,Medium,Low,Informational"
      polaris_application_name: "integrations-dev"   
      bridgecli_download_url: ${{ vars.BRIDGECLI_DOWNLOAD_URL }}
      polaris_project_name: "blackduck-security-extension-dev"   
      polaris_branch_name: ${{ github.head_ref || github.ref_name }}
      polaris_branch_parent_name: "main"

  
